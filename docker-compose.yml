services:
  postgres:
    image: postgres:16-alpine
    container_name: nexuserp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexuserp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: nexuserp-api
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=nexuserp;Username=postgres;Password=postgres
      - Jwt__Key=YourSuperSecretKeyThatShouldBeAtLeast32CharactersLong!
      - Jwt__Issuer=NexusERP
      - Jwt__Audience=NexusERP
      - Jwt__ExpirationMinutes=15
      - Jwt__RefreshExpirationDays=7

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexuserp-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
